<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DFGEAR - 업데이트 중...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #333;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 1.25rem; font-weight: 600; color: #c9b8ff; }
    .sub { font-size: 0.875rem; color: #888; margin-top: -12px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p class="title">최신 버전으로 업데이트 중...</p>
  <p class="sub">잠시만 기다려 주세요</p>

  <script>
    (async function () {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch (e) {
        console.warn('[reset] 정리 중 오류:', e);
      }
      location.replace('https://dfgear.xyz?updt=' + Date.now());
    })();
  </script>
</body>
</html>
